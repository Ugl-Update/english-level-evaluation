<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Records Office — English Proficiency Assessment</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@700;800&family=Barlow+Semi+Condensed:wght@600;700;800&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#EFE7D7; --card:#FBF7EE; --card2:#F4EDDD; --panel:#E6DCC7;
    --ink:#2B2620; --gray:#8C8270; --light:#544D41;
    --red:#B5302B; --gold:#9C7327; --green:#3E7F5C;
    --line:rgba(0,0,0,0.08); --line2:rgba(0,0,0,0.16);
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  body{ background:var(--bg); color:var(--ink); font-family:'Barlow',sans-serif; min-height:100vh;
    display:flex; flex-direction:column; align-items:center; padding:28px 16px 60px; line-height:1.5; }
  .wrap{ width:100%; max-width:780px; }

  .logo{ display:flex; align-items:center; gap:12px; margin-bottom:20px; }
  .logomark{ width:42px; height:42px; border-radius:9px; background:var(--red); color:#fff;
    font-family:'Barlow Condensed',sans-serif; font-weight:800; font-size:17px; letter-spacing:1px;
    display:flex; align-items:center; justify-content:center; flex-shrink:0; }
  .logo-txt .t1{ font-family:'Barlow Condensed',sans-serif; font-weight:800; font-size:17px; color:var(--ink); letter-spacing:1px; line-height:1.1; }
  .logo-txt .t2{ font-family:'Barlow Condensed',sans-serif; font-weight:700; font-size:10px; color:var(--gray); letter-spacing:2.2px; text-transform:uppercase; }

  .formhead{ border-bottom:1px solid var(--line2); padding-bottom:12px; margin-bottom:18px; }
  .formhead .rec{ font-family:'Barlow Semi Condensed',sans-serif; font-weight:600; font-size:12px; letter-spacing:0.06em; color:var(--gray); text-transform:uppercase; }
  h1{ font-family:'Barlow Semi Condensed',sans-serif; font-weight:800; font-size:24px; margin:12px 0 24px; color:var(--ink); }

  .card{ background:var(--card); border:1px solid var(--line2); padding:24px; margin-bottom:20px; }
  .section-label{ font-family:'Barlow Semi Condensed',sans-serif; font-weight:700; font-size:12px; letter-spacing:0.06em; color:var(--gray); text-transform:uppercase; }
  label{ display:block; font-size:13px; color:var(--light); margin-bottom:8px; }
  input[type=text],input[type=password]{ width:100%; background:var(--bg); border:1px solid var(--line2); color:var(--ink);
    padding:12px 14px; font-size:15px; font-family:'Barlow',sans-serif; margin-bottom:14px; border-radius:2px; }
  input:focus{ outline:none; border-color:var(--red); }
  button{ background:var(--red); color:#fff; border:none; font-family:'Barlow Semi Condensed',sans-serif; font-weight:700;
    font-size:13px; letter-spacing:0.03em; text-transform:uppercase; padding:12px 22px; cursor:pointer; border-radius:2px; }
  button:disabled{ background:var(--panel); color:var(--gray); cursor:not-allowed; }
  button:hover:not(:disabled){ background:#9a2824; }
  button.small{ padding:8px 16px; font-size:11px; }
  .msg{ font-size:13px; margin-top:10px; }
  .msg.error{ color:var(--red); }
  .msg.success{ color:var(--green); }
  .link-row{ display:flex; gap:10px; align-items:center; background:var(--bg); border:1px solid var(--line2);
    padding:10px 14px; margin-top:10px; font-family:'Barlow',monospace; font-size:12px; word-break:break-all; }
  .link-row span{ flex:1; }
  table{ width:100%; border-collapse:collapse; font-size:13px; }
  th,td{ text-align:left; padding:10px 8px; border-bottom:1px solid var(--line); }
  th{ color:var(--gray); font-family:'Barlow Semi Condensed',sans-serif; font-size:11px; text-transform:uppercase; letter-spacing:0.05em; font-weight:700; }
  .status-tag{ font-family:'Barlow Semi Condensed',sans-serif; font-size:11px; letter-spacing:0.04em; text-transform:uppercase; font-weight:700; }
  .status-pending{ color:var(--gold); }
  .status-completed{ color:var(--green); }
  .hidden{ display:none; }
  .score-tag{ font-family:'Barlow Semi Condensed',sans-serif; font-size:11px; font-weight:700; padding:3px 10px; border:1px solid currentColor; text-transform:uppercase; }
  .score-strong{ color:var(--green); }
  .score-adequate{ color:var(--gold); }
  .score-lacking{ color:var(--red); }
  .result-block{ border:1px solid var(--line2); margin-bottom:10px; background:var(--card); }
  .result-head{ display:flex; justify-content:space-between; align-items:center; padding:14px 16px; cursor:pointer; }
  .result-head:hover{ background:var(--card2); }
  .result-body{ padding:18px; border-top:1px solid var(--line); background:var(--bg); }
  .tier-line{ font-size:14px; margin:12px 0 4px; font-family:'Barlow Semi Condensed',sans-serif; font-weight:700; }
  .missed-ul{ list-style:none; padding-left:0; font-size:12px; color:var(--light); margin-bottom:10px; }
  .missed-ul li{ margin-bottom:6px; padding-left:10px; border-left:2px solid var(--red); }
  .written-block{ margin-top:14px; font-size:13px; }
  .written-block strong{ font-family:'Barlow Semi Condensed',sans-serif; font-weight:700; }
  .written-block p{ background:var(--card); border:1px solid var(--line2); padding:12px; margin-top:6px; color:var(--light); white-space:pre-wrap; }
  .audio-block{ margin-top:14px; }
  .audio-block .lbl{ font-family:'Barlow Semi Condensed',sans-serif; font-weight:700; font-size:12px; color:var(--gray); display:block; margin-bottom:4px; }
  .score-pending-review,.score-pending{ color:var(--gray); }
  .manual-score-block{ margin-top:18px; padding-top:14px; border-top:1px solid var(--line); }
  .manual-row{ display:flex; flex-wrap:wrap; gap:12px; align-items:flex-end; margin-top:10px; }
  .manual-row label{ margin-bottom:0; font-size:12px; }
  .manual-row select{ background:var(--bg); border:1px solid var(--line2); padding:8px 10px; font-size:13px; font-family:'Barlow',sans-serif; }
  .manual-msg{ font-size:12px; color:var(--green); }
  a{ color:var(--red); }
</style>
</head>
<body>
<div class="wrap">
  <div class="logo">
    <div class="logomark">UGL</div>
    <div class="logo-txt">
      <div class="t1">DISPATCH</div>
      <div class="t2">English Assessment</div>
    </div>
  </div>

  <div class="formhead"><span class="rec">Records Office — Admin</span></div>
  <h1>English Proficiency Assessment</h1>

  <div class="card" id="login-card">
    <label for="pw">Admin password</label>
    <input type="password" id="pw" placeholder="Enter password">
    <button id="btn-login">Unlock</button>
    <div class="msg error" id="login-msg"></div>
  </div>

  <div id="main-area" class="hidden">
    <div class="card">
      <label for="emp-name">Employee name</label>
      <input type="text" id="emp-name" placeholder="e.g. J. Alvarez">
      <button id="btn-generate">Generate Link</button>
      <div class="msg" id="gen-msg"></div>
      <div class="link-row hidden" id="link-row">
        <span id="link-text"></span>
        <button class="small" id="btn-copy">Copy</button>
      </div>
    </div>

    <div class="card">
      <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:14px;">
        <span class="section-label">All Employees</span>
        <button class="small" id="btn-refresh">Refresh</button>
      </div>
      <table id="emp-table">
        <thead><tr><th>Name</th><th>Status</th><th>Link</th></tr></thead>
        <tbody id="emp-tbody"></tbody>
      </table>
    </div>

    <div class="card">
      <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:14px;">
        <span class="section-label">Results</span>
        <button class="small" id="btn-refresh-results">Refresh</button>
      </div>
      <div id="results-list"></div>
    </div>
  </div>
</div>

<script>
const CONFIG = {
  SUPABASE_URL: 'https://ymaxtkaqfspsjaunfmuq.supabase.co',
  SUPABASE_ANON_KEY: 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InltYXh0a2FxZnNwc2phdW5mbXVxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE4NzY0NzQsImV4cCI6MjA5NzQ1MjQ3NH0.VchQxSTvkt5EczAyNQ4YuMLCaNqK1B9qKQX0waHCdAc',
  TEST_PAGE_URL: 'https://ugl-update.github.io/english-level-evaluation/',
};

let adminPassword = '';
function $(id){ return document.getElementById(id); }
function fnUrl(name){ return `${CONFIG.SUPABASE_URL}/functions/v1/${name}`; }
async function callFn(name, body){
  const res = await fetch(fnUrl(name), {
    method:'POST',
    headers:{ 'Content-Type':'application/json', 'Authorization': `Bearer ${CONFIG.SUPABASE_ANON_KEY}` },
    body: JSON.stringify(body)
  });
  const data = await res.json();
  if(!res.ok) throw new Error(data.error || 'Request failed');
  return data;
}
function escapeHtml(s){ return String(s ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

$('btn-login').addEventListener('click', async ()=>{
  const pw = $('pw').value;
  if(!pw) return;
  try{
    await callFn('list-employees', { password: pw });
    adminPassword = pw;
    $('login-card').classList.add('hidden');
    $('main-area').classList.remove('hidden');
    refreshList();
    refreshResults();
  } catch(e){
    $('login-msg').textContent = e.message;
  }
});

$('btn-generate').addEventListener('click', async ()=>{
  const name = $('emp-name').value.trim();
  const msg = $('gen-msg');
  msg.className='msg'; msg.textContent='';
  if(!name){ msg.className='msg error'; msg.textContent='Enter a name first.'; return; }
  try{
    const { token } = await callFn('create-employee', { password: adminPassword, name });
    const link = `${CONFIG.TEST_PAGE_URL}?token=${token}`;
    $('link-row').classList.remove('hidden');
    $('link-text').textContent = link;
    $('btn-copy').onclick = ()=>{ navigator.clipboard.writeText(link); $('btn-copy').textContent='Copied'; setTimeout(()=>$('btn-copy').textContent='Copy',1500); };
    msg.className='msg success'; msg.textContent=`Link generated for ${name}.`;
    $('emp-name').value='';
    refreshList();
  } catch(e){
    msg.className='msg error'; msg.textContent=e.message;
  }
});

async function refreshList(){
  try{
    const { employees } = await callFn('list-employees', { password: adminPassword });
    const tbody = $('emp-tbody');
    tbody.innerHTML='';
    employees.forEach(emp=>{
      const link = `${CONFIG.TEST_PAGE_URL}?token=${emp.token}`;
      const tr = document.createElement('tr');
      tr.innerHTML = `
        <td>${escapeHtml(emp.name)}</td>
        <td><span class="status-tag status-${emp.status}">${emp.status}</span></td>
        <td><a href="${link}" target="_blank" style="font-size:11px;">open link</a></td>
      `;
      tbody.appendChild(tr);
    });
  } catch(e){ console.error(e); }
}
$('btn-refresh').addEventListener('click', refreshList);

function bandClass(band){
  if(!band) return 'pending-review';
  return band.toLowerCase().replace(/\s+/g,'-');
}

function renderTier(label, scoreObj, missed){
  if(!scoreObj || scoreObj.manual) return '';
  let html = `<div class="tier-line">${label}: ${scoreObj.correct}/${scoreObj.total} <span class="score-tag score-${bandClass(scoreObj.band)}">${scoreObj.band}</span></div>`;
  if(missed && missed.length){
    html += '<ul class="missed-ul">' + missed.map(m=>
      `<li>"${escapeHtml(m.question)}" — chose: <em>${escapeHtml(m.chosenText ?? '(blank)')}</em>, correct: <em>${escapeHtml(m.correctOption)}</em></li>`
    ).join('') + '</ul>';
  } else {
    html += `<div style="font-size:12px; color:var(--gray); margin-bottom:10px;">No misses in this section.</div>`;
  }
  return html;
}

function renderListeningHeader(r){
  const ts = r.tier_scores?.listening;
  if(ts?.manual) return renderManualTier('Listening', ts);
  if(ts?.correct !== undefined) return renderTier('Listening', ts, r.missed_items?.listening);
  return renderManualTier('Listening', ts);
}

function renderSpeakingHeader(r){
  const ts = r.tier_scores?.speaking;
  if(ts?.manual || ts?.band) return renderManualTier('Speaking', ts);
  return '';
}

function renderManualTier(label, scoreObj){
  const band = scoreObj?.band || 'Pending review';
  return `<div class="tier-line">${label}: <span class="score-tag score-${bandClass(band)}">${escapeHtml(band)}</span> <span style="font-size:11px;color:var(--gray);">(manual review)</span></div>`;
}

function renderListeningReview(items, writtenResponses){
  if(items && items.length){
    return items.map(item => {
      if(item.type === 'written'){
        return `<div class="written-block"><strong>Listening — ${escapeHtml(item.id)} (written)</strong><p>${escapeHtml(item.response || '(no response)')}</p></div>`;
      }
      return `<div class="written-block"><strong>Listening — ${escapeHtml(item.id)} (MCQ)</strong><p>${escapeHtml(item.question)}</p><p>Answer: <em>${escapeHtml(item.chosenText ?? '(blank)')}</em></p><p style="font-size:11px;color:var(--gray);">Reference: ${escapeHtml(item.correctOption || '')}</p></div>`;
    }).join('');
  }
  return renderListeningWritten(writtenResponses);
}

function renderListeningWritten(responses){
  const ids = ['L2','L4','L6','L8','L10'];
  return ids.map(id =>
    `<div class="written-block"><strong>Listening — ${id} (written)</strong><p>${escapeHtml(responses?.[id] || '(no response)')}</p></div>`
  ).join('');
}

const MANUAL_BANDS = ['Pending review','Strong','Adequate','Lacking'];

function renderManualScoreControls(resultId, tierScores){
  const listenBand = tierScores?.listening?.band || 'Pending review';
  const speakBand = tierScores?.speaking?.band || 'Pending review';
  const opts = (selected) => MANUAL_BANDS.map(b =>
    `<option value="${b}"${b===selected?' selected':''}>${b}</option>`
  ).join('');
  return `
    <div class="manual-score-block">
      <strong style="font-size:13px;">Manual scores</strong>
      <div class="manual-row">
        <label>Listening<br><select id="listen-band-${resultId}">${opts(listenBand)}</select></label>
        <label>Speaking<br><select id="speak-band-${resultId}">${opts(speakBand)}</select></label>
        <button class="small" data-save-manual="${resultId}">Save scores</button>
        <span class="manual-msg" id="manual-msg-${resultId}"></span>
      </div>
    </div>
  `;
}

function renderSpeaking(urls){
  const entries = Object.entries(urls || {}).sort((a,b)=>{
    const na = parseInt(a[0].replace('speaking_',''), 10);
    const nb = parseInt(b[0].replace('speaking_',''), 10);
    return na - nb;
  });
  if(!entries.length) return '<div style="font-size:12px; color:var(--gray);">No recordings.</div>';
  return entries.map(([k,v])=>{
    const num = parseInt(k.replace('speaking_',''), 10);
    const label = `S${num + 1}`;
    return `<div style="margin-bottom:12px;"><span class="lbl">${label}</span><audio controls src="${v}" style="width:100%;"></audio></div>`;
  }).join('');
}

async function refreshResults(){
  try{
    const { results } = await callFn('get-results', { password: adminPassword });
    const list = $('results-list');
    list.innerHTML = '';
    if(!results.length){
      list.innerHTML = '<p style="color:var(--gray); font-size:13px;">No completed assessments yet.</p>';
      return;
    }
    results.forEach(r=>{
      const name = r.employees?.name || 'Unknown';
      const date = new Date(r.submitted_at).toLocaleString();
      const div = document.createElement('div');
      div.className = 'result-block';
      div.innerHTML = `
        <div class="result-head">
          <div><strong>${escapeHtml(name)}</strong><span style="color:var(--gray); font-size:12px; margin-left:10px;">${date}</span></div>
          <span class="score-tag score-${bandClass(r.overall_band)}">${r.overall_score}/${r.overall_total} — ${r.overall_band}</span>
        </div>
        <div class="result-body hidden">
          ${renderTier('Intermediate', r.tier_scores?.intermediate, r.missed_items?.intermediate)}
          ${renderTier('Advanced', r.tier_scores?.advanced, r.missed_items?.advanced)}
          ${renderListeningHeader(r)}
          ${renderListeningReview(r.missed_items?.listening_review, r.written_responses)}
          <div class="written-block"><strong>Written — Advanced (Short Load)</strong><p>${escapeHtml(r.written_responses?.AW_short || r.written_responses?.advanced || '(no response)')}</p></div>
          <div class="written-block"><strong>Written — Advanced (Damaged)</strong><p>${escapeHtml(r.written_responses?.AW_damaged || '(no response)')}</p></div>
          ${renderSpeakingHeader(r)}
          <div class="audio-block"><div style="margin-top:8px;">${renderSpeaking(r.audio_urls)}</div></div>
          ${renderManualScoreControls(r.id, r.tier_scores)}
        </div>
      `;
      div.querySelector('.result-head').addEventListener('click', ()=>{
        div.querySelector('.result-body').classList.toggle('hidden');
      });
      const saveBtn = div.querySelector('[data-save-manual]');
      if(saveBtn){
        saveBtn.addEventListener('click', async (e)=>{
          e.stopPropagation();
          const id = saveBtn.getAttribute('data-save-manual');
          const msg = div.querySelector(`#manual-msg-${id}`);
          try{
            await callFn('save-manual-scores', {
              password: adminPassword,
              result_id: id,
              listening_band: div.querySelector(`#listen-band-${id}`).value,
              speaking_band: div.querySelector(`#speak-band-${id}`).value,
            });
            msg.textContent = 'Saved.';
            msg.style.color = 'var(--green)';
          } catch(err){
            msg.textContent = err.message;
            msg.style.color = 'var(--red)';
          }
        });
      }
      list.appendChild(div);
    });
  } catch(e){ console.error(e); }
}
$('btn-refresh-results').addEventListener('click', refreshResults);
</script>
</body>
</html>
