<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Records Office &mdash; English Proficiency Assessment</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Source+Serif+4:opsz,wght@8..60,500;8..60,600;8..60,700&family=Public+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --paper:#ECE9E1; --card:#F7F5EF; --ink:#20242B; --ink-soft:#5B6168;
    --line:#C7C2B3; --accent:#2F4858; --flag:#8C3B2E; --stamp:#3B6B44;
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  body{ background:var(--paper); color:var(--ink); font-family:'Public Sans',sans-serif; min-height:100vh;
    display:flex; flex-direction:column; align-items:center; padding:32px 16px 70px; line-height:1.5; }
  .wrap{ width:100%; max-width:760px; }
  .formhead{ display:flex; justify-content:space-between; align-items:baseline; border-bottom:2px solid var(--ink);
    padding-bottom:14px; margin-bottom:6px; }
  .formhead .rec{ font-family:'IBM Plex Mono',monospace; font-size:11px; letter-spacing:0.06em; color:var(--ink-soft); text-transform:uppercase; }
  h1{ font-family:'Source Serif 4',serif; font-weight:600; font-size:26px; margin:14px 0 28px; }

  .card{ background:var(--card); border:1px solid var(--line); padding:24px; margin-bottom:22px; }
  .section-label{ font-family:'IBM Plex Mono',monospace; font-size:11px; letter-spacing:0.07em; color:var(--ink-soft); text-transform:uppercase; }
  label{ display:block; font-size:13px; color:var(--ink-soft); margin-bottom:8px; }
  input[type=text],input[type=password]{ width:100%; background:var(--paper); border:1px solid var(--line); color:var(--ink);
    padding:12px 14px; font-size:15px; font-family:'Public Sans',sans-serif; margin-bottom:14px; border-radius:1px; }
  input:focus{ outline:none; border-color:var(--accent); }
  button{ background:var(--ink); color:var(--paper); border:none; font-family:'Public Sans',sans-serif; font-weight:600;
    font-size:14px; padding:12px 22px; cursor:pointer; border-radius:1px; }
  button:disabled{ background:var(--line); color:var(--ink-soft); cursor:not-allowed; }
  button:hover:not(:disabled){ background:var(--accent); }
  button.small{ padding:8px 16px; font-size:12px; }
  .msg{ font-size:13px; margin-top:10px; font-family:'IBM Plex Mono',monospace; }
  .msg.error{ color:var(--flag); }
  .msg.success{ color:var(--stamp); }
  .link-row{ display:flex; gap:10px; align-items:center; background:var(--paper); border:1px solid var(--line);
    padding:10px 14px; margin-top:10px; font-family:'IBM Plex Mono',monospace; font-size:13px; word-break:break-all; }
  .link-row span{ flex:1; }
  table{ width:100%; border-collapse:collapse; font-size:13px; }
  th,td{ text-align:left; padding:10px 8px; border-bottom:1px solid var(--line); }
  th{ color:var(--ink-soft); font-family:'IBM Plex Mono',monospace; font-size:11px; text-transform:uppercase; letter-spacing:0.05em; }
  .status-tag{ font-family:'IBM Plex Mono',monospace; font-size:11px; letter-spacing:0.04em; text-transform:uppercase; }
  .status-pending{ color:var(--accent); }
  .status-completed{ color:var(--stamp); }
  .hidden{ display:none; }
  .score-tag{ font-family:'IBM Plex Mono',monospace; font-size:12px; font-weight:600; padding:3px 10px; border:1px solid currentColor; }
  .score-strong{ color:var(--stamp); }
  .score-adequate{ color:var(--accent); }
  .score-lacking{ color:var(--flag); }
  .result-block{ border:1px solid var(--line); margin-bottom:10px; }
  .result-head{ display:flex; justify-content:space-between; align-items:center; padding:14px 16px; cursor:pointer; background:var(--card); }
  .result-head:hover{ background:rgba(47,72,88,0.05); }
  .result-body{ padding:18px; border-top:1px solid var(--line); background:var(--paper); }
  .tier-line{ font-size:14px; margin:10px 0 4px; font-family:'Public Sans',sans-serif; font-weight:600; }
  .missed-ul{ list-style:none; padding-left:0; font-size:12px; color:var(--ink-soft); margin-bottom:10px; }
  .missed-ul li{ margin-bottom:5px; padding-left:10px; border-left:2px solid var(--flag); }
  .written-block{ margin-top:14px; font-size:13px; }
  .written-block p{ background:var(--card); border:1px solid var(--line); padding:10px 12px; margin-top:6px; color:var(--ink-soft); white-space:pre-wrap; }
  .audio-block{ margin-top:14px; }
  .audio-block .lbl{ font-family:'IBM Plex Mono',monospace; font-size:11px; color:var(--ink-soft); display:block; margin-bottom:4px; }
</style>
</head>
<body>
<div class="wrap">
  <div class="formhead"><span class="rec">Records Office</span></div>
  <h1>English Proficiency Assessment &mdash; Admin</h1>

  <div class="card" id="login-card">
    <label for="pw">Admin password</label>
    <input type="password" id="pw" placeholder="Enter password">
    <button id="btn-login">Unlock</button>
    <div class="msg error" id="login-msg"></div>
  </div>

  <div id="main-area" class="hidden">
    <div class="card">
      <label for="emp-name">Employee name</label>
      <input type="text" id="emp-name" placeholder="e.g. J. Alvarez">
      <button id="btn-generate">Generate Link</button>
      <div class="msg" id="gen-msg"></div>
      <div class="link-row hidden" id="link-row">
        <span id="link-text"></span>
        <button class="small" id="btn-copy">Copy</button>
      </div>
    </div>

    <div class="card">
      <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:14px;">
        <span class="section-label">All Employees</span>
        <button class="small" id="btn-refresh">Refresh</button>
      </div>
      <table id="emp-table">
        <thead><tr><th>Name</th><th>Status</th><th>Link</th></tr></thead>
        <tbody id="emp-tbody"></tbody>
      </table>
    </div>

    <div class="card">
      <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:14px;">
        <span class="section-label">Results</span>
        <button class="small" id="btn-refresh-results">Refresh</button>
      </div>
      <div id="results-list"></div>
    </div>
  </div>
</div>

<script>
const CONFIG = {
  SUPABASE_URL: 'https://ymaxtkaqfspsjaunfmuq.supabase.co',
  SUPABASE_ANON_KEY: 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InltYXh0a2FxZnNwc2phdW5mbXVxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE4NzY0NzQsImV4cCI6MjA5NzQ1MjQ3NH0.VchQxSTvkt5EczAyNQ4YuMLCaNqK1B9qKQX0waHCdAc',
  TEST_PAGE_URL: 'https://ugl-update.github.io/english-level-evaluation/',
};

let adminPassword = '';
function $(id){ return document.getElementById(id); }
function fnUrl(name){ return `${CONFIG.SUPABASE_URL}/functions/v1/${name}`; }
async function callFn(name, body){
  const res = await fetch(fnUrl(name), {
    method:'POST',
    headers:{ 'Content-Type':'application/json', 'Authorization': `Bearer ${CONFIG.SUPABASE_ANON_KEY}` },
    body: JSON.stringify(body)
  });
  const data = await res.json();
  if(!res.ok) throw new Error(data.error || 'Request failed');
  return data;
}
function escapeHtml(s){ return String(s ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

$('btn-login').addEventListener('click', async ()=>{
  const pw = $('pw').value;
  if(!pw) return;
  try{
    await callFn('list-employees', { password: pw });
    adminPassword = pw;
    $('login-card').classList.add('hidden');
    $('main-area').classList.remove('hidden');
    refreshList();
    refreshResults();
  } catch(e){
    $('login-msg').textContent = e.message;
  }
});

$('btn-generate').addEventListener('click', async ()=>{
  const name = $('emp-name').value.trim();
  const msg = $('gen-msg');
  msg.className='msg'; msg.textContent='';
  if(!name){ msg.className='msg error'; msg.textContent='Enter a name first.'; return; }
  try{
    const { token } = await callFn('create-employee', { password: adminPassword, name });
    const link = `${CONFIG.TEST_PAGE_URL}?token=${token}`;
    $('link-row').classList.remove('hidden');
    $('link-text').textContent = link;
    $('btn-copy').onclick = ()=>{ navigator.clipboard.writeText(link); $('btn-copy').textContent='Copied'; setTimeout(()=>$('btn-copy').textContent='Copy',1500); };
    msg.className='msg success'; msg.textContent=`Link generated for ${name}.`;
    $('emp-name').value='';
    refreshList();
  } catch(e){
    msg.className='msg error'; msg.textContent=e.message;
  }
});

async function refreshList(){
  try{
    const { employees } = await callFn('list-employees', { password: adminPassword });
    const tbody = $('emp-tbody');
    tbody.innerHTML='';
    employees.forEach(emp=>{
      const link = `${CONFIG.TEST_PAGE_URL}?token=${emp.token}`;
      const tr = document.createElement('tr');
      tr.innerHTML = `
        <td>${escapeHtml(emp.name)}</td>
        <td><span class="status-tag status-${emp.status}">${emp.status}</span></td>
        <td><a href="${link}" target="_blank" style="color:var(--accent); font-family:'IBM Plex Mono',monospace; font-size:11px;">open link</a></td>
      `;
      tbody.appendChild(tr);
    });
  } catch(e){ console.error(e); }
}
$('btn-refresh').addEventListener('click', refreshList);

function renderTier(label, scoreObj, missed){
  if(!scoreObj) return '';
  let html = `<div class="tier-line">${label}: ${scoreObj.correct}/${scoreObj.total} <span class="score-tag score-${scoreObj.band.toLowerCase()}">${scoreObj.band}</span></div>`;
  if(missed && missed.length){
    html += '<ul class="missed-ul">' + missed.map(m=>
      `<li>"${escapeHtml(m.question)}" &mdash; chose: <em>${escapeHtml(m.chosenText)}</em>, correct: <em>${escapeHtml(m.correctOption)}</em></li>`
    ).join('') + '</ul>';
  } else {
    html += `<div style="font-size:12px; color:var(--ink-soft); margin-bottom:10px;">No misses on this tier.</div>`;
  }
  return html;
}
function renderAudio(urls){
  const entries = Object.entries(urls||{});
  if(!entries.length) return '<div style="font-size:12px; color:var(--ink-soft);">No recordings.</div>';
  return entries.map(([k,v])=>
    `<div style="margin-bottom:10px;"><span class="lbl">${escapeHtml(k)}</span><audio controls src="${v}" style="width:100%;"></audio></div>`
  ).join('');
}

async function refreshResults(){
  try{
    const { results } = await callFn('get-results', { password: adminPassword });
    const list = $('results-list');
    list.innerHTML = '';
    if(!results.length){
      list.innerHTML = '<p style="color:var(--ink-soft); font-size:13px;">No completed assessments yet.</p>';
      return;
    }
    results.forEach(r=>{
      const name = r.employees?.name || 'Unknown';
      const date = new Date(r.submitted_at).toLocaleString();
      const div = document.createElement('div');
      div.className = 'result-block';
      div.innerHTML = `
        <div class="result-head">
          <div><strong>${escapeHtml(name)}</strong><span style="color:var(--ink-soft); font-size:12px; margin-left:10px;">${date}</span></div>
          <span class="score-tag score-${r.overall_band.toLowerCase()}">${r.overall_score}/${r.overall_total} &mdash; ${r.overall_band}</span>
        </div>
        <div class="result-body hidden">
          ${renderTier('Intermediate', r.tier_scores?.intermediate, r.missed_items?.intermediate)}
          ${renderTier('Advanced', r.tier_scores?.advanced, r.missed_items?.advanced)}
          <div class="written-block"><strong>Written &mdash; Intermediate</strong><p>${escapeHtml(r.written_responses?.intermediate || '(no response)')}</p></div>
          <div class="written-block"><strong>Written &mdash; Advanced</strong><p>${escapeHtml(r.written_responses?.advanced || '(no response)')}</p></div>
          <div class="audio-block"><strong style="font-size:13px;">Recordings</strong><div style="margin-top:8px;">${renderAudio(r.audio_urls)}</div></div>
        </div>
      `;
      div.querySelector('.result-head').addEventListener('click', ()=>{
        div.querySelector('.result-body').classList.toggle('hidden');
      });
      list.appendChild(div);
    });
  } catch(e){ console.error(e); }
}
$('btn-refresh-results').addEventListener('click', refreshResults);
</script>
</body>
</html>
